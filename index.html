<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Demo Hub</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --border: #e3e6eb;
    --text: #1c1f26;
    --muted: #6b7280;
    --accent: #4f46e5;
    --approved: #16a34a;
    --review: #d97706;
    --feedback: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 24px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 32px; }
  h1 { font-size: 26px; margin: 0 0 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin: 0; }
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  select, input {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: var(--card);
    color: var(--text);
  }
  input { flex: 1; min-width: 180px; }
  .grid { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
  }
  .card-main { min-width: 0; }
  .name { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
  .meta { font-size: 12.5px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .notes { font-size: 13px; color: var(--muted); margin: 0; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    background: #eef2ff;
    color: var(--accent);
  }
  .badge {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    color: white;
    white-space: nowrap;
  }
  .badge.Approved { background: var(--approved); }
  .badge.In-Review { background: var(--review); }
  .badge.Needs-Feedback { background: var(--feedback); }
  .actions { display: flex; align-items: center; gap: 10px; justify-self: end; }
  a.view {
    background: var(--accent);
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }
  a.view:hover { opacity: 0.9; }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }
  footer { margin-top: 32px; text-align: center; color: var(--muted); font-size: 12px; }
  @media (max-width: 560px) {
    .card { grid-template-columns: 1fr; }
    .actions { justify-self: start; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Design Demo Hub</h1>
    <p class="subtitle">Claude design prototypes for M1 App and People Module. Open a demo below to review.</p>
  </header>

  <div class="controls">
    <input id="search" type="text" placeholder="Search demos...">
    <select id="moduleFilter">
      <option value="">All modules</option>
    </select>
    <select id="statusFilter">
      <option value="">All statuses</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">No demos match your filters.</div>

  <footer>Updated from demos.json. Add a new entry there to list a new demo.</footer>
</div>

<script>
  let allDemos = [];

  function badgeClass(status) {
    return status.replace(/\s+/g, "-");
  }

  function render(demos) {
    const grid = document.getElementById("grid");
    const empty = document.getElementById("empty");
    grid.innerHTML = "";
    if (demos.length === 0) {
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";
    demos.forEach(d => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-main">
          <p class="name">${d.name}</p>
          <div class="meta">
            <span class="tag">${d.module}</span>
            <span class="badge ${badgeClass(d.status)}">${d.status}</span>
            <span>${d.date}</span>
            <span>${d.owner || ""}</span>
          </div>
          <p class="notes">${d.notes || ""}</p>
        </div>
        <div class="actions">
          <a class="view" href="${d.link}">View demo</a>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function applyFilters() {
    const q = document.getElementById("search").value.toLowerCase();
    const mod = document.getElementById("moduleFilter").value;
    const status = document.getElementById("statusFilter").value;
    const filtered = allDemos.filter(d => {
      const matchesQ = !q || d.name.toLowerCase().includes(q) || (d.notes || "").toLowerCase().includes(q);
      const matchesMod = !mod || d.module === mod;
      const matchesStatus = !status || d.status === status;
      return matchesQ && matchesMod && matchesStatus;
    });
    render(filtered);
  }

  function populateFilters(demos) {
    const modules = [...new Set(demos.map(d => d.module))];
    const statuses = [...new Set(demos.map(d => d.status))];
    const modSelect = document.getElementById("moduleFilter");
    const statusSelect = document.getElementById("statusFilter");
    modules.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m; opt.textContent = m;
      modSelect.appendChild(opt);
    });
    statuses.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      statusSelect.appendChild(opt);
    });
  }

  fetch("demos.json")
    .then(r => r.json())
    .then(data => {
      allDemos = data.sort((a, b) => new Date(b.date) - new Date(a.date));
      populateFilters(allDemos);
      render(allDemos);
    })
    .catch(() => {
      document.getElementById("empty").style.display = "block";
      document.getElementById("empty").textContent = "Could not load demos.json. Make sure it is in the same folder as this page.";
    });

  document.getElementById("search").addEventListener("input", applyFilters);
  document.getElementById("moduleFilter").addEventListener("change", applyFilters);
  document.getElementById("statusFilter").addEventListener("change", applyFilters);
</script>
</body>
</html>
